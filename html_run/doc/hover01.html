<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hover 01</title>
    <link rel="stylesheet" href="../css/reset.css">
    <style>
        section {
            padding: 100px 0;
            text-align: center;
        }

        section h2 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.025em;
            margin: 0 0 10px 0;
        }

        section p {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: -0.025em;
            margin: 0 0 30px 0;
        }

        section .container {
            display: flex;
            gap: 30px;
            width: 1200px;
            margin: 0 auto;
        }

        section .container figure {
            position: relative;
            flex: 1;
            /* overflow: hidden; */
            /* overflow x,y축 */
        }

        section img {
            max-width: 100%;
        }

        .hover01 .container figure .box {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: rgba(51, 51, 51, 1);
            /* opacity를 사용하면 background, color 둘 다 적용됨 */
            color: rgb(0, 0, 0);
            display: flex;
            justify-content: center;
            /* 좌우 가운데 */
            align-items: center;
            /* 아래위로 가운데 */
            overflow: hidden;
            /* 글자와 같이 hidden */
            transition: width 0.5s;
        }

        .hover01 .container figure:hover .box {
            width: 150px;
        }

        .hover01 .container figure img {
            transition: transform 0.5s;
        }

        .hover01 .container figure:hover img {
            transform: translateX(50px);
        }

        .hover02 {
            background: #f9f7f8;
        }

        .hover02 h2 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: -0.025em;
            margin: 0 0 10px 0;
        }

        .hover02 p {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: -0.025em;
            margin: 0 0 30px 0;
        }

        .hover02 .container {
            display: flex;
            gap: 30px;
            width: 1200px;
            margin: 0 auto;
        }

        .hover02 .container figure {
            position: relative;
            flex: 1;
        }

        .hover02 .container figure::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 1px solid #000;
            border-left: 1px solid #000;
            transition: 0.5s;
            box-sizing: border-box;
            /* 약간 빠져나온 선을 박스사이즈에 맞춤 */
            opacity: 0;
        }

        .hover02 .container figure::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-bottom: 1px solid #000;
            border-right: 1px solid #000;
            transition: 0.5s 0.3s;
            box-sizing: border-box;
            opacity: 0;
            /* hover의 시작점을 없애기 */
        }

        .hover02 .container figure:hover::before {
            width: 100%;
            height: 100%;
            opacity: 1;
            /* 0으로 없어진 hover효과 나타나게하기 */
        }

        .hover02 .container figure:hover::after {
            width: 100%;
            height: 100%;
            opacity: 1;
        }

        .hover02 img {
            max-width: 100%;
        }

        nav {
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            line-height: 50px;
            text-align: center;
        }

        nav>ul {
            display: flex;
            width: 1200px;
            margin: 0 auto;
        }

        nav>ul>li {
            position: relative;
            flex: 1;
            border-left: 1px solid #ddd;
        }

        nav>ul>li::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: #f8984c;
            transition: 0.5s;
        }

        nav>ul>li:hover::after {
            width: 100%;
        }

        nav>ul>li:last-child {
            border-right: 1px solid #ddd;
        }

        nav>ul>li a {
            display: block;
        }

        /* transition 되는 순서를 잘 생각하기 */
        .hover03 figure::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 10px;
            background: linear-gradient(to right, #f00, #ff0);
            transition: 0.5s 1.5s;
        }

        .hover03 figure:hover::before {
            width: 100%;
            transition: 0.5s;
        }

        .hover03 figure::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 0;
            background: linear-gradient(to bottom, #ff0, #0ff);
            transition: 0.5s 1s;
        }

        .hover03 figure:hover::after {
            height: 100%;
            transition: 0.5s 0.5s;
        }

        .hover03 figure .box::before {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 10px;
            background: linear-gradient(to left, #0ff, #f0f);
            transition: 0.5s 0.5s;
        }

        .hover03 figure:hover .box::before {
            width: 100%;
            transition: 0.5s 1s;
        }

        .hover03 figure .box::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 10px;
            height: 0;
            background: linear-gradient(to top, #f0f, #f00);
            transition: 0.5s;
        }

        .hover03 figure:hover .box::after {
            height: 100%;
            transition: 0.5s 1.5s;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="">MENU1</a></li>
            <li><a href="">MENU2</a></li>

    <section class="hover01">

        <p>hover를 이용한 position 이해를 배우면서 이쁜 걸 만들어 보겠습니다.</p>
        <div class="container">
            <figure>
                <img src="../img/lesedilarona01.jpg" alt="">
                <div class="box">
                    <a href="">
                        <i class='xi-cart'></i>
                    </a>
                </div>
            </figure>
            <figure>
                <img src="../img/lesedilarona02.jpg" alt="">
                <div class="box">

        <h2>hover를 사용해서 position을 배웁니다.</h2>
        <p>hover를 이용한 position 이해를 배우면서 이쁜 걸 만들어 보겠습니다.</p>
        <div class="container">
            <figure>
                <img src="../img/lesedilarona01.jpg" alt="">
            </figure>
            <figure>
                <img src="../img/lesedilarona02.jpg" alt="">
            </figure>
            <figure>
                <img src="../img/lesedilarona03.jpg" alt="">
            </figure>
        </div>
    </section>

    <section class="hover03">
        <h2>hover를 사용해서 position을 배웁니다.</h2>
        <p>hover를 이용한 position 이해를 배우면서 이쁜 걸 만들어 보겠습니다.</p>
        <div class="container">
            <figure>
                <div class="box">

            <figure>

                    <img src="../img/lesedilarona02.jpg" alt="">

            </figure>
            <figure>

                    <img src="../img/lesedilarona03.jpg" alt="">
                </div>
